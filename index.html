<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Daily Note Builder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e9ecef;
      --text-primary: #212529;
      --text-secondary: #495057;
      --text-muted: #6c757d;
      --border-color: #dee2e6;
      --accent-primary: #0077b6;
      --accent-hover: #005f92;
      --accent-light: #e7f5fb;
      --success: #198754;
      --warning: #fd7e14;
      --danger: #dc3545;
      --chip-bg: #e9ecef;
      --chip-active: #0077b6;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.15);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    [data-theme="dark"] {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #f0f6fc;
      --text-secondary: #c9d1d9;
      --text-muted: #8b949e;
      --border-color: #30363d;
      --accent-primary: #58a6ff;
      --accent-hover: #79b8ff;
      --accent-light: #1f3a5f;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --chip-bg: #30363d;
      --chip-active: #58a6ff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.6);
    }

    html, body, #root {
      height: 100%;
      overflow: auto;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    input, select, textarea {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
    }
    select option {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .tab-container {
      display: flex;
      gap: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 0 12px;
    }
    .tab-button {
      padding: 6px 14px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }
    .tab-button:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }
    .tab-button.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    .intervention-grid-horizontal {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      max-height: 140px;
      overflow-y: auto;
      padding: 2px 0;
    }

    .timer-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 64px;
      font-weight: 600;
      text-align: center;
      color: var(--text-primary);
      letter-spacing: 2px;
    }
    .timer-label {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
    }
    .timer-button {
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .timer-button:hover {
      transform: translateY(-1px);
    }
    .timer-button.start {
      background: var(--success);
      color: white;
    }
    .timer-button.stop {
      background: var(--danger);
      color: white;
    }
    .timer-button.pause {
      background: var(--warning);
      color: white;
    }
    .timer-button.reset {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    .productivity-stat {
      background: var(--bg-tertiary);
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }
    .productivity-stat-value {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent-primary);
      font-family: 'IBM Plex Mono', monospace;
    }
    .productivity-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .session-log {
      background: var(--bg-tertiary);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .session-log-time {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent-primary);
    }

    /* Main Layout Classes */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      padding: 4px 10px;
      width: 100%;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .page-title {
      font-size: 14px;
      font-weight: 600;
    }
    .btn-clear {
      padding: 3px 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-primary);
    }
    .output-card {
      background: var(--bg-secondary);
      border-radius: 6px;
      border: 1px solid var(--border-color);
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .output-preview {
      padding: 6px 10px;
      max-height: 70px;
      overflow-y: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      line-height: 1.5;
    }
    .output-preview.empty {
      color: var(--text-muted);
    }
    .output-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 10px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-tertiary);
    }
    .toggle-group {
      display: flex;
      background: var(--bg-secondary);
      border-radius: 3px;
      padding: 2px;
    }
    .toggle-btn {
      padding: 2px 8px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-size: 9px;
      font-weight: 500;
      background: transparent;
      color: var(--text-muted);
    }
    .toggle-btn.active {
      background: var(--accent-primary);
      color: #fff;
    }
    .btn-copy {
      padding: 3px 12px;
      background: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
    }
    .btn-copy.copied {
      background: var(--success);
    }
    .content-card {
      flex: 1;
      background: var(--bg-secondary);
      border-radius: 6px;
      border: 1px solid var(--border-color);
      padding: 8px;
      margin-bottom: 4px;
      overflow-y: auto;
      min-height: 0;
    }
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: var(--bg-secondary);
      border-radius: 6px;
      border: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .btn-nav {
      padding: 4px 10px;
      border: 1px solid var(--border-color);
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .btn-nav:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .btn-nav.primary {
      background: var(--accent-primary);
      color: #fff;
      border: none;
    }
    .btn-nav.primary:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
    }
    .step-indicators {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .step-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      font-size: 9px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      color: var(--text-muted);
    }
    .step-dot.active {
      background: var(--accent-primary);
      color: #fff;
    }
    .step-dot.completed {
      background: var(--success);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ============================================
    // DATA LOADING
    // ============================================

    // Data files split by domain for better maintainability
    const DATA_FILES = [
      'data/cpt-activities.json',  // CPT_CODES, ACTIVITIES_BY_CPT
      'data/goals.json',           // GOALS, GOALS_BY_ACTIVITY
      'data/assist.json',          // ASSIST_LEVELS, ASSIST_PURPOSES, ASSIST_LOCATIONS_BY_ACTIVITY, ASSIST_PURPOSES_BY_ACTIVITY, MODI_MODIFIERS
      'data/cues.json',            // CUE_LEVELS, CUE_TYPES, CUE_PURPOSES, CUE_CONTEXTS, CUE_BODY_PARTS, CUE_PURPOSES_BY_ACTIVITY, QUICK_ADD_CUES_BY_ACTIVITY
      'data/clinical.json',        // DEFICITS, BODY_PARTS_BY_ACTIVITY, PERFORMANCE_QUALIFIERS_BY_ACTIVITY, EQUIPMENT_BY_ACTIVITY
      'data/session.json',         // PROGRESS_OPTIONS, TOLERANCE_OPTIONS, PLAN_OPTIONS, PATIENT_SUBJECTIVE_OPTIONS, SESSION_CONTEXT_OPTIONS, CLINICAL_REASONING_OPTIONS
      'data/vitals.json'           // PAIN_LOCATIONS, PAIN_RATINGS, HR_OPTIONS, O2SAT_OPTIONS, BP_OPTIONS
    ];

    const useDataStore = () => {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        // Fetch all data files in parallel for optimal performance
        Promise.all(
          DATA_FILES.map(file =>
            fetch(`./${file}`)
              .then(res => {
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                return res.json();
              })
          )
        )
          .then(results => {
            // Merge all data objects into a single object
            const mergedData = results.reduce((acc, curr) => ({ ...acc, ...curr }), {});
            setData(mergedData);
            setLoading(false);
          })
          .catch(err => {
            console.error('Error loading data:', err);
            setError(err.message);
            setLoading(false);
          });
      }, []);

      return { data, loading, error };
    };

    // ============================================
    // HELPER FUNCTIONS
    // ============================================

    const generateId = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 11);

    const getEquipmentForActivity = (activity, EQUIPMENT_BY_ACTIVITY) => {
      if (!activity || !EQUIPMENT_BY_ACTIVITY) return EQUIPMENT_BY_ACTIVITY?.['Default'] || [];
      for (const [key, equipment] of Object.entries(EQUIPMENT_BY_ACTIVITY)) {
        if (activity.toLowerCase().includes(key.toLowerCase())) return equipment;
      }
      return EQUIPMENT_BY_ACTIVITY['Default'] || [];
    };

    const getDeficitsForActivity = (parentActivity, DEFICITS) => {
      if (!parentActivity || !DEFICITS) return DEFICITS?.['Default'] || [];
      for (const [key, deficits] of Object.entries(DEFICITS)) {
        if (parentActivity.toLowerCase().includes(key.toLowerCase())) return deficits;
      }
      return DEFICITS['Default'] || [];
    };

    const getGoalsForActivity = (parentActivity, childActivity, GOALS_BY_ACTIVITY) => {
      if (!GOALS_BY_ACTIVITY) return [];
      const checkActivity = childActivity || parentActivity || '';
      for (const [key, goalIds] of Object.entries(GOALS_BY_ACTIVITY)) {
        if (checkActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(checkActivity.toLowerCase())) {
          return goalIds;
        }
      }
      return GOALS_BY_ACTIVITY['Default'] || [];
    };

    const getAssistLocationsForActivity = (parentActivity, childActivity, ASSIST_LOCATIONS_BY_ACTIVITY) => {
      if (!ASSIST_LOCATIONS_BY_ACTIVITY) return [];
      if (childActivity) {
        for (const [key, locations] of Object.entries(ASSIST_LOCATIONS_BY_ACTIVITY)) {
          if (childActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(childActivity.toLowerCase())) {
            return locations;
          }
        }
      }
      if (parentActivity) {
        for (const [key, locations] of Object.entries(ASSIST_LOCATIONS_BY_ACTIVITY)) {
          if (parentActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(parentActivity.toLowerCase())) {
            return locations;
          }
        }
      }
      return ASSIST_LOCATIONS_BY_ACTIVITY['Default'] || [];
    };

    const getPerformanceQualifiers = (parentActivity, childActivity, PERFORMANCE_QUALIFIERS_BY_ACTIVITY) => {
      if (!PERFORMANCE_QUALIFIERS_BY_ACTIVITY) return [];
      if (childActivity) {
        for (const [key, qualifiers] of Object.entries(PERFORMANCE_QUALIFIERS_BY_ACTIVITY)) {
          if (childActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(childActivity.toLowerCase())) {
            return qualifiers;
          }
        }
      }
      if (parentActivity) {
        for (const [key, qualifiers] of Object.entries(PERFORMANCE_QUALIFIERS_BY_ACTIVITY)) {
          if (parentActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(parentActivity.toLowerCase())) {
            return qualifiers;
          }
        }
      }
      return PERFORMANCE_QUALIFIERS_BY_ACTIVITY['Default'] || [];
    };

    const getBodyPartsForActivity = (parentActivity, childActivity, BODY_PARTS_BY_ACTIVITY) => {
      if (!BODY_PARTS_BY_ACTIVITY) return [];
      if (childActivity) {
        for (const [key, bodyParts] of Object.entries(BODY_PARTS_BY_ACTIVITY)) {
          if (childActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(childActivity.toLowerCase())) {
            return bodyParts;
          }
        }
      }
      if (parentActivity) {
        for (const [key, bodyParts] of Object.entries(BODY_PARTS_BY_ACTIVITY)) {
          if (parentActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(parentActivity.toLowerCase())) {
            return bodyParts;
          }
        }
      }
      return BODY_PARTS_BY_ACTIVITY['Default'] || [];
    };

    const getCueContextsForActivity = (parentActivity, childActivity, CUE_CONTEXTS) => {
      if (!CUE_CONTEXTS) return [];
      if (childActivity) {
        for (const [key, contexts] of Object.entries(CUE_CONTEXTS)) {
          if (childActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(childActivity.toLowerCase())) {
            return contexts;
          }
        }
      }
      if (parentActivity) {
        for (const [key, contexts] of Object.entries(CUE_CONTEXTS)) {
          if (parentActivity.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(parentActivity.toLowerCase())) {
            return contexts;
          }
        }
      }
      return CUE_CONTEXTS['Default'] || [];
    };

    const formatTime = (seconds) => {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const formatTimeShort = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    };

    // ============================================
    // UI COMPONENTS
    // ============================================

    const ChipButton = ({ selected, onClick, children, variant = 'default', size = 'md', style = {} }) => {
      const sizeStyles = {
        sm: { padding: '3px 6px', fontSize: '10px', borderRadius: '3px' },
        md: { padding: '4px 8px', fontSize: '11px', borderRadius: '4px' },
        lg: { padding: '5px 10px', fontSize: '12px', borderRadius: '5px' }
      };

      const variantStyles = {
        default: {
          background: selected ? 'var(--accent-primary)' : 'var(--chip-bg)',
          color: selected ? '#fff' : 'var(--text-primary)',
          border: 'none'
        },
        outline: {
          background: selected ? 'var(--accent-light)' : 'transparent',
          color: selected ? 'var(--accent-primary)' : 'var(--text-secondary)',
          border: `1px solid ${selected ? 'var(--accent-primary)' : 'var(--border-color)'}`
        }
      };

      return (
        <button
          onClick={onClick}
          style={{
            display: 'inline-flex',
            alignItems: 'center',
            justifyContent: 'center',
            cursor: 'pointer',
            fontFamily: 'inherit',
            fontWeight: 500,
            transition: 'all 0.12s ease',
            whiteSpace: 'nowrap',
            textAlign: 'left',
            ...sizeStyles[size],
            ...variantStyles[variant],
            ...style
          }}
        >
          {children}
        </button>
      );
    };

    const SectionHeader = ({ children }) => (
      <div style={{
        fontSize: '9px',
        fontWeight: 600,
        textTransform: 'uppercase',
        letterSpacing: '0.5px',
        color: 'var(--text-muted)',
        marginBottom: '4px'
      }}>
        {children}
      </div>
    );

    const OptionGrid = ({ children, columns = 2 }) => (
      <div style={{
        display: 'grid',
        gridTemplateColumns: `repeat(${columns}, 1fr)`,
        gap: '4px'
      }}>
        {children}
      </div>
    );

    const MultiSelectChip = ({ item, selected, onToggle, size = 'sm' }) => (
      <ChipButton
        selected={selected}
        onClick={() => onToggle(item)}
        size={size}
        style={{ minWidth: 'fit-content' }}
      >
        {selected && <span style={{ marginRight: '4px' }}>✓</span>}
        {item}
      </ChipButton>
    );

    const STEPS = [
      { id: 'cpt', label: 'CPT', required: true },
      { id: 'activity', label: 'Activity', required: true },
      { id: 'goal', label: 'Goal', required: true },
      { id: 'support', label: 'Support', required: false },
      { id: 'response', label: 'Response', required: false },
      { id: 'notes', label: 'Notes', required: false }
    ];

    // ============================================
    // PRODUCTIVITY TRACKER COMPONENT
    // ============================================

    const PROD_STORAGE_KEYS = {
      BLOCKS: 'prodBlocks',
      SHIFT: 'prodShift'
    };

    const BLOCK_TYPES = [
      { id: 'treatment', label: 'Treatment', color: '#2d8a4e' },
      { id: 'break', label: 'Break', color: '#b86e00' },
      { id: 'lunch', label: 'Lunch', color: '#7c4dba' },
      { id: 'meeting', label: 'Meeting', color: '#2970b8' },
      { id: 'documentation', label: 'Documentation', color: '#555' },
      { id: 'other', label: 'Other', color: '#6b5344' }
    ];

    const QUICK_SESSIONS = [
      { type: 'treatment', duration: 15, label: '+15m' },
      { type: 'treatment', duration: 23, label: '+23m' },
      { type: 'treatment', duration: 25, label: '+25m' },
      { type: 'treatment', duration: 38, label: '+38m' },
      { type: 'break', duration: 15, label: '+15m break' },
      { type: 'lunch', duration: 30, label: '+30m lunch' }
    ];

    // Productivity utility functions
    const toMins = (t) => {
      if (!t || typeof t !== 'string' || !t.includes(':')) return 0;
      const parts = t.split(':');
      const h = parseInt(parts[0], 10) || 0;
      const m = parseInt(parts[1], 10) || 0;
      return h * 60 + m;
    };

    const toTime = (m) => {
      const mins = typeof m === 'number' && !isNaN(m) ? Math.max(0, m) : 0;
      return `${String(Math.floor(mins / 60)).padStart(2, '0')}:${String(mins % 60).padStart(2, '0')}`;
    };

    const fmtTime = (t) => {
      if (!t || typeof t !== 'string' || !t.includes(':')) return '--:--';
      const parts = t.split(':');
      const h = parseInt(parts[0], 10) || 0;
      const m = parseInt(parts[1], 10) || 0;
      const ap = h >= 12 ? 'PM' : 'AM';
      return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${ap}`;
    };

    const fmtDur = (m) => {
      return m < 60 ? `${m}m` : `${Math.floor(m / 60)}h${m % 60 ? ` ${m % 60}m` : ''}`;
    };

    const getBlockColor = (type) => {
      return BLOCK_TYPES.find(b => b.id === type)?.color || '#555';
    };

    const ProductivityTracker = () => {
      // Shift settings
      const [shiftStart, setShiftStart] = useState('08:00');
      const [shiftEnd, setShiftEnd] = useState('16:30');
      const [unpaidBreak, setUnpaidBreak] = useState(30);
      const [setupTime, setSetupTime] = useState(5);
      const [transitionTime, setTransitionTime] = useState(5);
      const [targetProductivity, setTargetProductivity] = useState(85);

      // Session blocks
      const [blocks, setBlocks] = useState([]);

      // Add form state
      const [newBlock, setNewBlock] = useState({
        type: 'treatment',
        start: '08:00',
        end: '08:30'
      });

      // Edit modal state
      const [editingIndex, setEditingIndex] = useState(null);
      const [editBlock, setEditBlock] = useState({ type: '', start: '', end: '' });

      // Current time for timeline
      const [currentTime, setCurrentTime] = useState(new Date());

      // Load saved data on mount
      useEffect(() => {
        try {
          const savedBlocks = localStorage.getItem(PROD_STORAGE_KEYS.BLOCKS);
          if (savedBlocks) {
            const parsed = JSON.parse(savedBlocks);
            const blocksWithIds = parsed.map(b => b.id ? b : { ...b, id: generateId() });
            setBlocks(blocksWithIds);
          }

          const savedShift = localStorage.getItem(PROD_STORAGE_KEYS.SHIFT);
          if (savedShift) {
            const s = JSON.parse(savedShift);
            setShiftStart(s.start || '08:00');
            setShiftEnd(s.end || '16:30');
            setUnpaidBreak(s.unpaid ?? 30);
            setSetupTime(s.setup ?? 5);
            setTransitionTime(s.trans ?? 5);
            setTargetProductivity(s.target ?? 85);
          }
        } catch (e) {
          console.error('Failed to load saved data:', e);
        }
      }, []);

      // Update current time every minute
      useEffect(() => {
        const interval = setInterval(() => {
          setCurrentTime(new Date());
        }, 60000);
        return () => clearInterval(interval);
      }, []);

      // Save data whenever it changes
      const saveData = useCallback(() => {
        try {
          localStorage.setItem(PROD_STORAGE_KEYS.BLOCKS, JSON.stringify(blocks));
          localStorage.setItem(PROD_STORAGE_KEYS.SHIFT, JSON.stringify({
            start: shiftStart,
            end: shiftEnd,
            unpaid: unpaidBreak,
            setup: setupTime,
            trans: transitionTime,
            target: targetProductivity
          }));
        } catch (e) {
          console.error('Failed to save data:', e);
        }
      }, [blocks, shiftStart, shiftEnd, unpaidBreak, setupTime, transitionTime, targetProductivity]);

      useEffect(() => {
        saveData();
      }, [saveData]);

      // Get treatments sorted by start time
      const treatments = useMemo(() => {
        return blocks
          .filter(b => b.type === 'treatment')
          .sort((a, b) => toMins(a.start) - toMins(b.start));
      }, [blocks]);

      // Calculate next available time slot
      const getNextTime = useCallback(() => {
        if (!treatments.length) {
          return toMins(shiftStart) + setupTime;
        }
        let latest = toMins(shiftStart);
        treatments.forEach(b => {
          const end = toMins(b.end);
          if (end > latest) latest = end;
        });
        return latest + transitionTime;
      }, [treatments, shiftStart, setupTime, transitionTime]);

      // Calculate stats
      // Productivity Formula:
      // - Total Shift = End Time - Start Time
      // - Unpaid Time = max(settings unpaid, logged lunch/break time)
      // - Paid Time = Total Shift - Unpaid Time
      // - Billable Time = Treatment minutes only
      // - Productivity % = (Billable / Paid) * 100
      //
      // Clock Out Calculation:
      // - To achieve target productivity: Billable / Paid = Target / 100
      // - Required Paid Time = Billable * 100 / Target
      // - Clock Out = Shift Start + Required Paid Time + Unpaid Time
      const stats = useMemo(() => {
        const start = toMins(shiftStart);
        const end = toMins(shiftEnd);
        const total = Math.max(0, end - start);

        // Calculate logged unpaid time (lunch + break blocks)
        let loggedUnpaid = 0;
        blocks.forEach(b => {
          if (b.type === 'lunch' || b.type === 'break') {
            loggedUnpaid += toMins(b.end) - toMins(b.start);
          }
        });

        // Use the greater of: settings unpaid OR logged unpaid
        const actualUnpaid = Math.max(unpaidBreak, loggedUnpaid);
        const paid = Math.max(0, total - actualUnpaid);

        // Billable = treatment time only
        let billable = 0;
        blocks.forEach(b => {
          if (b.type === 'treatment') {
            billable += toMins(b.end) - toMins(b.start);
          }
        });

        // Calculate setup + transition time (non-billable but paid)
        const numTreatments = treatments.length;
        const setupTransTime = numTreatments > 0
          ? setupTime + Math.max(0, numTreatments - 1) * transitionTime
          : 0;

        // Calculate non-billable paid work (documentation, meetings, other)
        let nonBillablePaid = 0;
        blocks.forEach(b => {
          if (b.type === 'documentation' || b.type === 'meeting' || b.type === 'other') {
            nonBillablePaid += toMins(b.end) - toMins(b.start);
          }
        });

        // Productivity = billable / paid time * 100
        const productivity = paid > 0 ? (billable / paid) * 100 : 0;

        // Clock out time calculation:
        // To hit target%, we need: billable / requiredPaid = target / 100
        // So: requiredPaid = billable * 100 / target
        // Clock out = shift start + requiredPaid + unpaid break
        let clockOutTime = '--:--';
        if (billable > 0 && targetProductivity > 0) {
          const requiredPaidTime = (billable * 100) / targetProductivity;
          const clockOut = start + requiredPaidTime + actualUnpaid;
          clockOutTime = fmtTime(toTime(Math.ceil(clockOut)));
        }

        return {
          total,
          paid,
          billable,
          productivity,
          clockOutTime,
          actualUnpaid,
          setupTransTime,
          loggedUnpaid,
          nonBillablePaid
        };
      }, [blocks, shiftStart, shiftEnd, unpaidBreak, targetProductivity, treatments.length, setupTime, transitionTime]);

      // Quick add session
      const handleQuickAdd = (type, duration) => {
        const start = getNextTime();
        const newSession = {
          id: generateId(),
          type,
          start: toTime(start),
          end: toTime(start + duration)
        };

        const updated = [...blocks, newSession].sort((a, b) => toMins(a.start) - toMins(b.start));
        setBlocks(updated);
      };

      // Add block manually
      const handleAddBlock = () => {
        if (toMins(newBlock.end) <= toMins(newBlock.start)) {
          alert('End time must be after start time');
          return;
        }

        const updated = [...blocks, { ...newBlock, id: generateId() }].sort((a, b) => toMins(a.start) - toMins(b.start));
        setBlocks(updated);

        const tr = newBlock.type === 'treatment' ? transitionTime : 0;
        setNewBlock({
          type: 'treatment',
          start: toTime(toMins(newBlock.end) + tr),
          end: toTime(toMins(newBlock.end) + tr + 30)
        });
      };

      // Delete block
      const handleDeleteBlock = (index) => {
        setBlocks(prev => prev.filter((_, i) => i !== index));
      };

      // Open edit modal
      const handleEditBlock = (index) => {
        setEditingIndex(index);
        setEditBlock({ ...blocks[index] });
      };

      // Save edit
      const handleSaveEdit = () => {
        if (toMins(editBlock.end) <= toMins(editBlock.start)) {
          alert('End time must be after start time');
          return;
        }

        const updated = blocks.map((b, i) => i === editingIndex ? { ...editBlock } : b)
          .sort((a, b) => toMins(a.start) - toMins(b.start));
        setBlocks(updated);
        setEditingIndex(null);
      };

      // Clear all sessions
      const handleClearAll = () => {
        if (confirm('Clear all sessions for today?')) {
          setBlocks([]);
        }
      };

      // Get productivity color class
      const getProductivityClass = () => {
        if (stats.productivity >= 90) return 'great';
        if (stats.productivity >= 75) return 'good';
        if (stats.productivity >= 60) return 'med';
        return 'low';
      };

      // Render timeline
      const renderTimeline = () => {
        const start = toMins(shiftStart);
        const end = toMins(shiftEnd);
        const total = end - start;
        if (total <= 0) return null;

        const elements = [];

        // Setup block before first treatment
        if (treatments.length && setupTime > 0) {
          const first = toMins(treatments[0].start);
          const sStart = first - setupTime;
          const left = ((sStart - start) / total) * 100;
          const w = (setupTime / total) * 100;
          if (left >= 0) {
            elements.push(
              <div
                key="setup"
                className="timeline-block setup"
                style={{
                  left: `${Math.max(0, left)}%`,
                  width: `${Math.min(w, 100 - Math.max(0, left))}%`
                }}
                title={`Setup ${fmtDur(setupTime)}`}
              />
            );
          }
        }

        // Render all blocks
        blocks.forEach((b, i) => {
          const bStart = toMins(b.start);
          const bEnd = toMins(b.end);
          const dur = bEnd - bStart;
          const left = ((bStart - start) / total) * 100;
          const w = (dur / total) * 100;

          if (left >= 0 && left < 100) {
            elements.push(
              <div
                key={`block-${i}`}
                className={`timeline-block ${b.type}`}
                style={{
                  left: `${left}%`,
                  width: `${Math.min(w, 100 - left)}%`,
                  background: getBlockColor(b.type)
                }}
                onClick={() => handleEditBlock(i)}
                title={`${b.type} ${fmtTime(b.start)}-${fmtTime(b.end)}`}
              >
                {w > 6 ? fmtDur(dur) : ''}
              </div>
            );

            // Transition after treatment
            if (b.type === 'treatment' && transitionTime > 0) {
              const tIdx = treatments.findIndex(t => t.start === b.start && t.end === b.end);
              if (tIdx >= 0 && tIdx < treatments.length - 1) {
                const tLeft = ((bEnd - start) / total) * 100;
                const tW = (transitionTime / total) * 100;
                elements.push(
                  <div
                    key={`trans-${i}`}
                    className="timeline-block transition"
                    style={{
                      left: `${tLeft}%`,
                      width: `${Math.min(tW, 100 - tLeft)}%`
                    }}
                    title={`Transition ${fmtDur(transitionTime)}`}
                  />
                );
              }
            }
          }
        });

        // Now line
        const nowM = currentTime.getHours() * 60 + currentTime.getMinutes();
        if (nowM >= start && nowM <= end) {
          elements.push(
            <div
              key="now"
              className="timeline-now"
              style={{ left: `${((nowM - start) / total) * 100}%` }}
            />
          );
        }

        return elements;
      };

      const styles = {

      return (

            <h1 style={{ fontSize: '16px', fontWeight: 600, color: 'var(--text-primary)' }}>Productivity Tracker</h1>
            <button
              type="button"
              onClick={handleClearAll}
              style={{
                padding: '4px 12px',

            >
              Clear Day

          {/* Shift Settings */}
          <div style={styles.section}>

                <input

              </div>
              <div style={styles.field}>

              </div>
              <div style={styles.field}>
                <label style={styles.label}>Unpaid (min)</label>
                <input

                <input

                <input

                        </button>
                        <button
                          type="button"
                          onClick={() => handleDeleteBlock(i)}
                          style={{ ...styles.btnSm, color: 'var(--danger)' }}
                          aria-label="Delete"
                        >
                          ×
                        </button>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>

          {/* Summary Stats */}
          <div style={styles.section}>
            <div style={styles.sectionTitle}>Summary</div>
            <div style={styles.statsGrid}>
              <div style={{ ...styles.stat, ...styles.statPrimary }}>
                <div style={styles.statLabel}>Productivity</div>
                <div style={{
                  ...styles.statValue,
                  ...styles.statValuePrimary,
                  color: getProductivityClass() === 'great' ? '#60a5fa' :
                         getProductivityClass() === 'good' ? '#4ade80' :
                         getProductivityClass() === 'med' ? '#f39c12' : '#e74c3c'
                }}>
                  {stats.productivity.toFixed(1)}<span style={styles.statUnit}>%</span>
                </div>
              </div>
              <div style={styles.stat}>
                <div style={styles.statLabel}>Shift</div>
                <div style={styles.statValue}>{stats.total}<span style={styles.statUnit}>m</span></div>
              </div>
              <div style={styles.stat}>
                <div style={styles.statLabel}>Unpaid</div>
                <div style={styles.statValue}>{stats.actualUnpaid}<span style={styles.statUnit}>m</span></div>
              </div>
              <div style={styles.stat}>
                <div style={styles.statLabel}>Paid</div>
                <div style={styles.statValue}>{stats.paid}<span style={styles.statUnit}>m</span></div>
              </div>
              <div style={styles.stat}>
                <div style={styles.statLabel}>Billable</div>
                <div style={styles.statValue}>{stats.billable}<span style={styles.statUnit}>m</span></div>
              </div>
              <div style={styles.stat}>
                <div style={styles.statLabel}>Setup/Trans</div>
                <div style={styles.statValue}>{stats.setupTransTime}<span style={styles.statUnit}>m</span></div>
              </div>
            </div>
            {/* Formula explanation */}
            <div style={{ marginTop: '8px', fontSize: '9px', color: 'var(--text-muted)', lineHeight: 1.4 }}>
              Productivity = Billable / Paid x 100 = {stats.billable} / {stats.paid} x 100 = {stats.productivity.toFixed(1)}%
            </div>
          </div>

          {/* Edit Modal */}
          {editingIndex !== null && (
            <div style={styles.modal} onClick={() => setEditingIndex(null)}>
              <div style={styles.modalContent} onClick={(e) => e.stopPropagation()}>
                <h3 style={styles.modalTitle}>Edit Session</h3>
                <div style={{ ...styles.field, marginBottom: '10px' }}>
                  <label style={styles.label}>Type</label>
                  <select
                    value={editBlock.type}
                    onChange={(e) => setEditBlock(prev => ({ ...prev, type: e.target.value }))}
                    style={{ ...styles.input, width: '100%' }}
                  >
                    {BLOCK_TYPES.map(bt => (
                      <option key={bt.id} value={bt.id}>{bt.label}</option>
                    ))}
                  </select>
                </div>
                <div style={styles.modalRow}>
                  <div style={{ ...styles.field, flex: 1 }}>
                    <label style={styles.label}>Start</label>
                    <input
                      type="time"
                      value={editBlock.start}
                      onChange={(e) => setEditBlock(prev => ({ ...prev, start: e.target.value }))}
                      style={{ ...styles.input, width: '100%' }}
                    />
                  </div>
                  <div style={{ ...styles.field, flex: 1 }}>
                    <label style={styles.label}>End</label>
                    <input
                      type="time"
                      value={editBlock.end}
                      onChange={(e) => setEditBlock(prev => ({ ...prev, end: e.target.value }))}
                      style={{ ...styles.input, width: '100%' }}
                    />
                  </div>
                </div>
                <div style={styles.modalActions}>
                  <button
                    type="button"
                    onClick={() => setEditingIndex(null)}
                    style={{ ...styles.btn, flex: 1, background: 'var(--bg-tertiary)', color: 'var(--text-secondary)' }}
                  >
                    Cancel
                  </button>
                  <button
                    type="button"
                    onClick={handleSaveEdit}
                    style={{ ...styles.btn, flex: 1, background: 'var(--accent-primary)', color: '#fff' }}
                  >
                    Save
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Timeline block styles */}
          <style>{`
            .timeline-block {
              position: absolute;
              top: 3px;
              height: 30px;
              border-radius: 3px;
              cursor: pointer;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 9px;
              color: rgba(255,255,255,0.9);
              transition: opacity 0.15s;
            }
            .timeline-block:hover { opacity: 0.85; }
            .timeline-block.setup { background: #1a7a7a; }
            .timeline-block.transition { background: #9a3a5a; }
            .timeline-now {
              position: absolute;
              top: 0;
              bottom: 0;
              width: 2px;
              background: #e74c3c;
            }
          `}</style>
        </div>
      );
    };

    // ============================================
    // MAIN APPLICATION
    // ============================================

    const OTDailyNoteBuilder = () => {
      const { data, loading, error } = useDataStore();

      const [activeTab, setActiveTab] = useState('notes');
      const [currentStep, setCurrentStep] = useState(0);
      const [cptCode, setCptCode] = useState(null);
      const [selectedActivities, setSelectedActivities] = useState([]);
      const [activityParams, setActivityParams] = useState({ sets: '', reps: '', equipment: '' });
      const [goal, setGoal] = useState(null);
      const [assists, setAssists] = useState([]);
      const [newAssist, setNewAssist] = useState({ level: '', location: '', purpose: '', modifier: '' });
      const [editingAssistIndex, setEditingAssistIndex] = useState(null);
      const [cues, setCues] = useState([]);
      const [deficit, setDeficit] = useState(null);
      const [progress, setProgress] = useState(null);
      const [tolerance, setTolerance] = useState(null);
      const [plan, setPlan] = useState(null);
      const [selectedPerformance, setSelectedPerformance] = useState([]);
      const [selectedContext, setSelectedContext] = useState([]);
      const [selectedReasoning, setSelectedReasoning] = useState([]);
      const [patientSubjective, setPatientSubjective] = useState('');
      const [painLocation, setPainLocation] = useState('');
      const [painRating, setPainRating] = useState('');
      const [vitals, setVitals] = useState({ hr: '', o2sat: '', bp: '' });
      const [outputStyle, setOutputStyle] = useState('goal');
      const [copied, setCopied] = useState(false);
      const [activityModalStep, setActivityModalStep] = useState('parent');
      const [selectedParent, setSelectedParent] = useState(null);
      const [selectedSubCategory, setSelectedSubCategory] = useState(null);
      const [newCue, setNewCue] = useState({ level: '', type: '', bodyPart: '', purpose: '', context: '' });
      const [editingCueIndex, setEditingCueIndex] = useState(null);
      const [showAllGoals, setShowAllGoals] = useState(false);
      const [savedNotes, setSavedNotes] = useState([]);
      const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('otNoteDarkMode');
        return saved === 'true';
      });

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
        localStorage.setItem('otNoteDarkMode', darkMode);
      }, [darkMode]);

      useEffect(() => {
        try {
          const saved = localStorage.getItem('otNoteHistory');
          if (saved) setSavedNotes(JSON.parse(saved));
        } catch (e) { console.error('Failed to load history:', e); }
      }, []);

      const primaryActivity = selectedActivities.length > 0 ? selectedActivities[0] : null;
      const primaryParent = selectedParent;

      const getActivitiesForCPT = useCallback(() => {
        if (!cptCode || !data) return {};
        return data.ACTIVITIES_BY_CPT[cptCode] || {};
      }, [cptCode, data]);

      const filteredGoals = useMemo(() => {
        if (!data) return [];
        if (showAllGoals) return data.GOALS;
        const relevantIds = getGoalsForActivity(primaryParent, primaryActivity, data.GOALS_BY_ACTIVITY);
        return data.GOALS.filter(g => relevantIds.includes(g.id));
      }, [primaryParent, primaryActivity, showAllGoals, data]);

      const deficitOptions = useMemo(() => {
        if (!data) return [];
        return getDeficitsForActivity(primaryParent, data.DEFICITS);
      }, [primaryParent, data]);

      const assistPurposeOptions = useMemo(() => {
        if (!data) return [];
        return data.ASSIST_PURPOSES || [];
      }, [data]);

      const cueBodyPartOptions = useMemo(() => {
        if (!data) return [];
        return getBodyPartsForActivity(primaryParent, primaryActivity, data.BODY_PARTS_BY_ACTIVITY);
      }, [primaryParent, primaryActivity, data]);

      const cueContextOptions = useMemo(() => {
        if (!data) return [];
        return getCueContextsForActivity(primaryParent, primaryActivity, data.CUE_CONTEXTS);
      }, [primaryParent, primaryActivity, data]);

      const buildClinicianAnalysis = useCallback(() => {
        const parts = [];
        if (selectedPerformance.length > 0) {
          parts.push(selectedPerformance.length === 1 ? `Patient performed task ${selectedPerformance[0]}` : `Patient demonstrated ${selectedPerformance.join(' and ')} performance patterns`);
        }
        if (selectedContext.length > 0) parts.push(...selectedContext.map(ctx => ctx + ', which influenced therapeutic approach'));
        if (selectedReasoning.length > 0) parts.push(...selectedReasoning.map(r => r + ' based on clinical assessment'));
        return parts.join('. ') + (parts.length > 0 ? '.' : '');
      }, [selectedPerformance, selectedContext, selectedReasoning]);

      const buildOutput = useCallback(() => {
        if (!data) return '';
        const parts = [];

        let activityStr = '';
        if (selectedActivities.length > 0) {
          if (selectedActivities.length === 1) {
            activityStr = selectedActivities[0];
          } else if (selectedActivities.length === 2) {
            activityStr = selectedActivities.join(' and ');
          } else {
            const last = selectedActivities[selectedActivities.length - 1];
            const rest = selectedActivities.slice(0, -1);
            activityStr = rest.join(', ') + ', and ' + last;
          }

          const params = [];
          if (activityParams.sets && activityParams.reps) params.push(`${activityParams.sets}x${activityParams.reps}`);
          else if (activityParams.sets) params.push(`${activityParams.sets} sets`);
          else if (activityParams.reps) params.push(`${activityParams.reps} reps`);
          if (activityParams.equipment) params.push(activityParams.equipment.toLowerCase());
          if (params.length) activityStr += ` (${params.join(', ')})`;
        }

        const goalPhrase = goal ? data.GOALS.find(g => g.id === goal)?.phrase : '';
        const assistPhrases = assists.map(a => {
          const level = data.ASSIST_LEVELS.find(l => l.id === a.level);
          if (!level) return '';
          if (a.level === 'I') return 'Independent';
          if (a.level === 'ModI') return 'Modified independent' + (a.modifier ? ` ${a.modifier}` : '');
          if (a.level === 'S') return 'Supervision' + (a.purpose ? ` ${a.purpose}` : '');
          if (a.level === 'CGA') return 'CGA' + (a.purpose ? ` ${a.purpose}` : '');
          let phrase = level.full;
          if (a.location) phrase += ` ${a.location}`;
          if (a.purpose) phrase += ` ${a.purpose}`;
          return phrase;
        }).filter(Boolean);

        const cuePhrases = cues.map(c => {
          let phrase = `${c.level} ${c.type} cues`;
          if (c.bodyPart) phrase += ` to ${c.bodyPart}`;
          if (c.purpose) phrase += ` for ${c.purpose}`;
          if (c.context) phrase += ` during ${c.context}`;
          return phrase.toLowerCase();
        });

        const deficitPhrase = deficit ? deficit.charAt(0).toLowerCase() + deficit.slice(1) : '';
        const progressData = progress ? data.PROGRESS_OPTIONS.find(p => p.id === progress) : null;
        const tolerancePhrase = tolerance ? data.TOLERANCE_OPTIONS.find(t => t.id === tolerance)?.phrase : '';
        const planPhrase = plan ? data.PLAN_OPTIONS.find(p => p.id === plan)?.phrase : '';

        if (outputStyle === 'goal') {
          if (goalPhrase && activityStr) parts.push(`To ${goalPhrase}, patient instructed in ${activityStr}.`);
          if (deficitPhrase) parts.push(`${deficit} noted.`);
          if (assistPhrases.length || cuePhrases.length) {
            const combined = [...assistPhrases, ...cuePhrases].filter(Boolean);
            if (combined.length === 1) parts.push(`${combined[0]} required.`);
            else if (combined.length > 1) { const last = combined.pop(); parts.push(`${combined.join(', ')}, and ${last} required.`); }
          }
          if (progressData) parts.push(progressData.goalLed + '.');
          if (tolerancePhrase) parts.push(tolerancePhrase + '.');
          if (planPhrase) parts.push(planPhrase + '.');
        } else {
          if (activityStr && goalPhrase) {
            let sentence = `Patient performed ${activityStr}`;
            if (assistPhrases.length || cuePhrases.length) {
              const combined = [...assistPhrases, ...cuePhrases].filter(Boolean);
              if (combined.length === 1) sentence += ` with ${combined[0]}`;
              else if (combined.length > 1) { const last = combined.pop(); sentence += ` with ${combined.join(', ')}, and ${last}`; }
            }
            sentence += ` to ${goalPhrase}.`;
            parts.push(sentence);
          }
          if (progressData && deficitPhrase) parts.push(`${progressData.activityLed}. Assistance required 2/2 ${deficitPhrase}.`);
          else if (progressData) parts.push(progressData.activityLed + '.');
          else if (deficitPhrase) parts.push(`Assistance required 2/2 ${deficitPhrase}.`);
          if (tolerancePhrase) parts.push(tolerancePhrase + '.');
          if (planPhrase) parts.push(planPhrase + '.');
        }

        const clinicalAnalysis = buildClinicianAnalysis();
        if (clinicalAnalysis.trim()) parts.push(clinicalAnalysis.trim());

        const responseItems = [];
        if (patientSubjective.trim()) responseItems.push(`Patient reports: "${patientSubjective.trim()}"`);
        if (painLocation.trim() && painRating.trim()) responseItems.push(`Pain reported ${painRating}/10 at ${painLocation.trim()}`);
        else if (painRating.trim()) responseItems.push(`Pain reported ${painRating}/10`);
        const vitalsList = [];
        if (vitals.hr) vitalsList.push(`HR: ${vitals.hr}`);
        if (vitals.o2sat) vitalsList.push(`O2 Sat: ${vitals.o2sat}%`);
        if (vitals.bp) vitalsList.push(`BP: ${vitals.bp}`);
        if (vitalsList.length > 0) responseItems.push(`Vitals: ${vitalsList.join(', ')}`);
        if (responseItems.length > 0) parts.push(responseItems.join('. ') + '.');

        return parts.join(' ');
      }, [data, selectedActivities, activityParams, goal, assists, cues, deficit, progress, tolerance, plan, selectedPerformance, selectedContext, selectedReasoning, patientSubjective, painLocation, painRating, vitals, outputStyle, buildClinicianAnalysis]);

      const output = useMemo(() => buildOutput(), [buildOutput]);

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(output);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
          const newNote = {
            id: generateId(),
            timestamp: new Date().toISOString(),
            cptCode,
            goal,
            selectedActivities,
            activityParams,
            assists,
            cues,
            deficit,
            progress,
            tolerance,
            plan,
            selectedPerformance,
            selectedContext,
            selectedReasoning,
            patientSubjective,
            painLocation,
            painRating,
            vitals,
            outputStyle,
            outputText: output
          };
          const updatedNotes = [newNote, ...savedNotes].slice(0, 20);
          setSavedNotes(updatedNotes);
          try { localStorage.setItem('otNoteHistory', JSON.stringify(updatedNotes)); } catch (e) { console.error('Storage full:', e); }
        } catch (e) { console.error('Failed to copy:', e); }
      };

      const handleClear = () => {
        setCptCode(null);
        setSelectedActivities([]);
        setActivityParams({ sets: '', reps: '', equipment: '' });
        setGoal(null); setAssists([]); setNewAssist({ level: '', location: '', purpose: '', modifier: '' });
        setEditingAssistIndex(null); setCues([]); setDeficit(null); setProgress(null); setTolerance(null);
        setPlan(null); setSelectedPerformance([]); setSelectedContext([]); setSelectedReasoning([]);
        setPatientSubjective(''); setPainLocation(''); setPainRating(''); setVitals({ hr: '', o2sat: '', bp: '' });
        setCurrentStep(0); setActivityModalStep('parent'); setSelectedParent(null); setSelectedSubCategory(null);
      };

      const handleCPTSelect = (code) => {
        if (cptCode !== code) {
          setCptCode(code);
          setSelectedActivities([]);
          setActivityParams({ sets: '', reps: '', equipment: '' });
          setGoal(null); setDeficit(null); setActivityModalStep('parent'); setSelectedParent(null); setSelectedSubCategory(null);
        }
        setTimeout(() => setCurrentStep(1), 100);
      };

      const handleParentSelect = (parent) => {
        setSelectedParent(parent);
        const activities = getActivitiesForCPT();
        const children = activities[parent];
        if (cptCode === '97535' && typeof children === 'object' && !Array.isArray(children)) setActivityModalStep('subcategory');
        else setActivityModalStep('child');
      };

      const handleSubCategorySelect = (subcat) => {
        setSelectedSubCategory(subcat);
        setActivityModalStep('child');
      };

      const handleActivityToggle = (activity) => {
        setSelectedActivities(prev => {
          if (prev.includes(activity)) {
            return prev.filter(a => a !== activity);
          } else {
            return [...prev, activity];
          }
        });
      };

      const handleProceedToParams = () => {
        if (selectedActivities.length > 0) {
          setActivityModalStep('params');
        }
      };

      const handleAddAssist = () => {
        if (newAssist.level) {
          if (editingAssistIndex !== null) {
            setAssists(prev => prev.map((a, i) => i === editingAssistIndex ? { ...newAssist, id: a.id } : a));
            setEditingAssistIndex(null);
          } else { setAssists(prev => [...prev, { ...newAssist, id: generateId() }]); }
          setNewAssist({ level: '', location: '', purpose: '', modifier: '' });
        }
      };

      const handleRemoveAssist = (index) => setAssists(prev => prev.filter((_, i) => i !== index));
      const handleEditAssist = (index) => { setNewAssist(assists[index]); setEditingAssistIndex(index); };
      const handleCancelAssistEdit = () => { setNewAssist({ level: '', location: '', purpose: '', modifier: '' }); setEditingAssistIndex(null); };

      const handleAddCue = () => {
        if (newCue.level && newCue.type) {
          if (editingCueIndex !== null) {
            setCues(prev => prev.map((c, i) => i === editingCueIndex ? { ...newCue, id: c.id } : c));
            setEditingCueIndex(null);
          } else { setCues(prev => [...prev, { ...newCue, id: generateId() }]); }
          setNewCue({ level: '', type: '', bodyPart: '', purpose: '', context: '' });
        }
      };

      const handleRemoveCue = (index) => setCues(prev => prev.filter((_, i) => i !== index));
      const handleEditCue = (index) => { setNewCue(cues[index]); setEditingCueIndex(index); };
      const handleCancelCueEdit = () => { setNewCue({ level: '', type: '', bodyPart: '', purpose: '', context: '' }); setEditingCueIndex(null); };

      const getChildrenForSelection = () => {
        const activities = getActivitiesForCPT();
        if (!selectedParent) return { short: [], phrases: [] };
        const children = activities[selectedParent];
        if (Array.isArray(children)) return { short: children, phrases: [] };
        if (selectedSubCategory && children[selectedSubCategory]) {
          const subData = children[selectedSubCategory];
          if (subData && typeof subData === 'object' && !Array.isArray(subData) && ('short' in subData || 'phrases' in subData)) {
            return { short: subData.short || [], phrases: subData.phrases || [] };
          }
          if (Array.isArray(subData)) return { short: subData, phrases: [] };
        }
        return { short: [], phrases: [] };
      };

      const getSubCategories = () => {
        const activities = getActivitiesForCPT();
        if (!selectedParent) return [];
        const children = activities[selectedParent];
        if (typeof children === 'object' && !Array.isArray(children)) return Object.keys(children);
        return [];
      };

      const canProceed = () => {
        switch (STEPS[currentStep].id) {
          case 'cpt': return !!cptCode;
          case 'activity': return selectedActivities.length > 0;
          case 'goal': return !!goal;
          default: return true;
        }
      };

      const handleNext = () => {
        // Handle activity sub-steps
        if (STEPS[currentStep].id === 'activity') {
          if (activityModalStep === 'child' && selectedActivities.length > 0) {
            setActivityModalStep('params');
            return;
          }
        }
        // Move to next main step
        if (currentStep < STEPS.length - 1) setCurrentStep(prev => prev + 1);
      };
      const handleBack = () => {
        if (STEPS[currentStep].id === 'activity') {
          if (activityModalStep === 'params') {
            setActivityModalStep('child');
            return;
          }
          if (activityModalStep === 'child') {
            if (selectedSubCategory) {
              setActivityModalStep('subcategory');
              setSelectedSubCategory(null);
            } else {
              setActivityModalStep('parent');
              setSelectedParent(null);
            }
            setSelectedActivities([]);
            return;
          }
          if (activityModalStep === 'subcategory') {
            setActivityModalStep('parent');
            setSelectedParent(null);
            setSelectedSubCategory(null);
            return;
          }
        }
        if (currentStep > 0) setCurrentStep(prev => prev - 1);
      };

      // ============================================
      // RENDER STAGE CONTENT
      // ============================================

      const renderStageContent = () => {
        if (!data) return <div>Loading data...</div>;

        const stepId = STEPS[currentStep].id;

        switch (stepId) {
          case 'cpt':
            return (
              <div>
                <SectionHeader>Select CPT Code</SectionHeader>
                <OptionGrid columns={2}>
                  {data.CPT_CODES.map(cpt => (
                    <ChipButton key={cpt.code} selected={cptCode === cpt.code} onClick={() => handleCPTSelect(cpt.code)} size="md">
                      {cpt.code} — {cpt.label}
                    </ChipButton>
                  ))}
                </OptionGrid>
              </div>
            );

          case 'activity':
            return (
              <div>
                <SectionHeader>
                  {activityModalStep === 'parent' && 'Select Activity Category'}
                  {activityModalStep === 'subcategory' && `${selectedParent} — Select Sub-Category`}
                  {activityModalStep === 'child' && `${selectedParent}${selectedSubCategory ? ` → ${selectedSubCategory}` : ''} — Select Activities (Multi-Select)`}
                  {activityModalStep === 'params' && 'Activity Parameters (Optional)'}
                </SectionHeader>

                {activityModalStep === 'parent' && (
                  <OptionGrid columns={2}>
                    {Object.keys(getActivitiesForCPT()).map(parent => (
                      <ChipButton key={parent} selected={false} onClick={() => handleParentSelect(parent)} size="md">{parent}</ChipButton>
                    ))}
                  </OptionGrid>
                )}

                {activityModalStep === 'subcategory' && (
                  <OptionGrid columns={2}>
                    {getSubCategories().map(subcat => (
                      <ChipButton key={subcat} selected={false} onClick={() => handleSubCategorySelect(subcat)} size="md">{subcat}</ChipButton>
                    ))}
                  </OptionGrid>
                )}

                {activityModalStep === 'child' && (() => {
                  const { short, phrases } = getChildrenForSelection();

                  return (
                    <div>
                      <div style={{ marginBottom: '12px' }}>
                        {short.length > 0 && (
                          <div style={{ marginBottom: '8px' }}>
                            <div style={{ fontSize: '10px', fontWeight: 600, color: 'var(--text-muted)', marginBottom: '6px', textTransform: 'uppercase' }}>
                              Activities {selectedActivities.length > 0 && `(${selectedActivities.length} selected)`}
                            </div>
                            <div style={{
                              display: 'grid',
                              gridTemplateColumns: 'repeat(3, 1fr)',
                              gap: '3px',
                              maxHeight: '130px',
                              overflowY: 'auto'
                            }}>
                              {short.map(child => (
                                <MultiSelectChip
                                  key={child}
                                  item={child}
                                  selected={selectedActivities.includes(child)}
                                  onToggle={handleActivityToggle}
                                  size="sm"
                                />
                              ))}
                            </div>
                          </div>
                        )}

                        {phrases.length > 0 && (
                          <div>
                            <div style={{ fontSize: '10px', fontWeight: 600, color: 'var(--text-muted)', marginBottom: '6px', textTransform: 'uppercase' }}>
                              Intervention Phrases
                            </div>
                            <div style={{
                              display: 'grid',
                              gridTemplateColumns: 'repeat(2, 1fr)',
                              gap: '3px',
                              maxHeight: '120px',
                              overflowY: 'auto'
                            }}>
                              {phrases.map(child => (
                                <ChipButton
                                  key={child}
                                  selected={selectedActivities.includes(child)}
                                  onClick={() => handleActivityToggle(child)}
                                  size="sm"
                                  style={{ whiteSpace: 'normal', textAlign: 'left' }}

                                  {selectedActivities.includes(child) && <span style={{ marginRight: '4px' }}>✓</span>}

                          style={{ width: '100%', padding: '6px 8px', border: '1px solid var(--border-color)', borderRadius: '4px', fontSize: '12px', background: 'var(--bg-secondary)', color: 'var(--text-primary)' }}

                        </select>
                      </div>
                    </div>
                    <button

                      key={g.id}
                      selected={goal === g.id}

                      if (assist.level === 'ModI' && assist.modifier) display += ` ${assist.modifier}`;

                          <button onClick={() => handleEditAssist(index)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--accent-primary)', fontSize: '10px' }}>✎</button>
                          <button onClick={() => handleRemoveAssist(index)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--accent-primary)', fontSize: '12px' }}>×</button>
                        </div>

                          <button key={cue.label} onClick={() => { if (editingCueIndex === null) { setCues(prev => [...prev, { level: cue.level, type: cue.type, bodyPart: cue.bodyPart, purpose: cue.purpose, context: cue.context, id: generateId() }]); }}} style={{ padding: '4px 8px', background: 'var(--bg-secondary)', border: '1px solid var(--border-color)', borderRadius: '4px', cursor: 'pointer', fontSize: '10px', color: 'var(--text-primary)' }}>
                            {cue.label}
                          </button>

                      })()}

                      <select value={newCue.level} onChange={(e) => setNewCue(prev => ({ ...prev, level: e.target.value }))} style={{ width: '100%', padding: '6px 8px', border: '1px solid var(--border-color)', borderRadius: '4px', fontSize: '11px', background: 'var(--bg-secondary)', color: 'var(--text-primary)' }}>
                        <option value="">Select...</option>
                        {data.CUE_LEVELS.map(l => (<option key={l} value={l}>{l}</option>))}

                    </div>
                    <div>

                      </select>

                      <button onClick={handleCancelCueEdit} style={{ flex: 1, padding: '6px', background: 'var(--bg-secondary)', color: 'var(--text-secondary)', border: '1px solid var(--border-color)', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>Cancel</button>

                      {editingCueIndex !== null ? 'Update' : 'Add Cue'}

                <SectionHeader>Deficit</SectionHeader>
                <OptionGrid columns={2}>

                  ))}
                </OptionGrid>

                <div style={{ marginTop: '12px' }}>
                  <SectionHeader>Progress</SectionHeader>
                  <OptionGrid columns={3}>
                    {data.PROGRESS_OPTIONS.map(p => (
                      <ChipButton key={p.id} selected={progress === p.id} onClick={() => setProgress(progress === p.id ? null : p.id)} size="sm">{p.label}</ChipButton>
                    ))}
                  </OptionGrid>
                </div>

                  <SectionHeader>Tolerance</SectionHeader>
                  <OptionGrid columns={2}>
                    {data.TOLERANCE_OPTIONS.map(t => (
                      <ChipButton key={t.id} selected={tolerance === t.id} onClick={() => setTolerance(tolerance === t.id ? null : t.id)} size="sm" variant="outline">{t.label}</ChipButton>

                  </OptionGrid>
                </div>

                  <SectionHeader>Plan for Next Session</SectionHeader>
                  <OptionGrid columns={2}>
                    {data.PLAN_OPTIONS.map(p => (
                      <ChipButton key={p.id} selected={plan === p.id} onClick={() => setPlan(plan === p.id ? null : p.id)} size="sm" variant="outline">{p.label}</ChipButton>

                  </OptionGrid>
                </div>

                    <SectionHeader>Pain</SectionHeader>
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <select value={painLocation} onChange={(e) => setPainLocation(e.target.value)} style={{ flex: 2, padding: '6px 8px', border: '1px solid var(--border-color)', borderRadius: '4px', fontSize: '11px', background: 'var(--bg-secondary)', color: 'var(--text-primary)' }}>

                      <select value={painRating} onChange={(e) => setPainRating(e.target.value)} style={{ flex: 1, padding: '6px 8px', border: '1px solid var(--border-color)', borderRadius: '4px', fontSize: '11px', background: 'var(--bg-secondary)', color: 'var(--text-primary)' }}>

                        {data.PAIN_RATINGS.map(r => (<option key={r} value={r}>{r}</option>))}
                      </select>
                    </div>
                  </div>
                  <div>
                    <SectionHeader>Vitals</SectionHeader>
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <select value={vitals.hr} onChange={(e) => setVitals(prev => ({ ...prev, hr: e.target.value }))} style={{ flex: 1, padding: '6px 8px', border: '1px solid var(--border-color)', borderRadius: '4px', fontSize: '11px', background: 'var(--bg-secondary)', color: 'var(--text-primary)' }}>

                        {data.HR_OPTIONS.map(hr => (<option key={hr} value={hr}>{hr}</option>))}

                    ))}

                    <SectionHeader>Session Context</SectionHeader>
                    <OptionGrid columns={2}>
                      {data.SESSION_CONTEXT_OPTIONS.map(ctx => (
                        <ChipButton key={ctx} selected={selectedContext.includes(ctx)} onClick={() => { if (selectedContext.includes(ctx)) setSelectedContext(prev => prev.filter(c => c !== ctx)); else setSelectedContext(prev => [...prev, ctx]); }} size="sm" variant="outline">{ctx}</ChipButton>

                    <SectionHeader>Clinical Reasoning</SectionHeader>
                    <OptionGrid columns={2}>
                      {data.CLINICAL_REASONING_OPTIONS.map(reason => (
                        <ChipButton key={reason} selected={selectedReasoning.includes(reason)} onClick={() => { if (selectedReasoning.includes(reason)) setSelectedReasoning(prev => prev.filter(r => r !== reason)); else setSelectedReasoning(prev => [...prev, reason]); }} size="sm" variant="outline">{reason}</ChipButton>
                      ))}
                    </OptionGrid>
                  </div>
                </div>
              </div>
            );

          default:
            return null;
        }
      };

      if (loading) {
        return (
          <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: '18px', marginBottom: '8px' }}>Loading...</div>
              <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Fetching data store</div>
            </div>
          </div>
        );
      }

      if (error) {
        return (
          <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ textAlign: 'center', color: 'var(--danger)' }}>
              <div style={{ fontSize: '18px', marginBottom: '8px' }}>Error Loading Data</div>
              <div style={{ fontSize: '12px' }}>{error}</div>
              <div style={{ fontSize: '11px', marginTop: '12px', color: 'var(--text-muted)' }}>
                Make sure the data/ folder exists with all JSON files
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          <div className="tab-container">
            <button
              className={`tab-button ${activeTab === 'notes' ? 'active' : ''}`}
              onClick={() => setActiveTab('notes')}
            >
              Note Builder
            </button>
            <button
              className={`tab-button ${activeTab === 'productivity' ? 'active' : ''}`}
              onClick={() => setActiveTab('productivity')}
            >
              Productivity
            </button>
            <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '8px', paddingRight: '8px' }}>
              <button
                onClick={() => setDarkMode(!darkMode)}
                style={{
                  padding: '4px 10px',
                  background: 'var(--bg-tertiary)',
                  border: '1px solid var(--border-color)',
                  borderRadius: '4px',
                  cursor: 'pointer',
                  fontSize: '11px',
                  color: 'var(--text-primary)'
                }}
              >
                {darkMode ? '☀️ Light' : '🌙 Dark'}
              </button>
            </div>
          </div>

          {activeTab === 'productivity' ? (
            <div style={{ flex: 1, overflowY: 'auto', background: 'var(--bg-primary)' }}>
              <ProductivityTracker />
            </div>
          ) : (
            <div className="main-container">
              <div className="page-header">
                <h1 className="page-title">OT Daily Note Builder</h1>
                <button onClick={handleClear} className="btn-clear">Clear</button>
              </div>

              <div className="output-card">
                <div className={`output-preview ${!output ? 'empty' : ''}`}>
                  {output || 'Start building your note...'}
                </div>
                <div className="output-toolbar">
                  <div className="toggle-group">
                    <button onClick={() => setOutputStyle('goal')} className={`toggle-btn ${outputStyle === 'goal' ? 'active' : ''}`}>Goal-Led</button>
                    <button onClick={() => setOutputStyle('activity')} className={`toggle-btn ${outputStyle === 'activity' ? 'active' : ''}`}>Activity-Led</button>
                  </div>
                  <button onClick={handleCopy} className={`btn-copy ${copied ? 'copied' : ''}`}>{copied ? '✓ Copied' : 'Copy'}</button>
                </div>
              </div>

              <div className="content-card">
                {renderStageContent()}
              </div>

              <div className="nav-bar">
                <button onClick={handleBack} disabled={currentStep === 0} className="btn-nav">← Back</button>

                <div className="step-indicators">
                  {STEPS.map((step, index) => (
                    <button
                      key={step.id}
                      onClick={() => setCurrentStep(index)}
                      className={`step-dot ${index === currentStep ? 'active' : ''} ${index < currentStep ? 'completed' : ''}`}
                      title={step.label}
                    >
                      {index < currentStep ? '✓' : index + 1}
                    </button>
                  ))}
                </div>

                <button
                  onClick={handleNext}
                  disabled={currentStep === STEPS.length - 1 || (STEPS[currentStep].required && !canProceed())}
                  className={`btn-nav ${!(currentStep === STEPS.length - 1 || (STEPS[currentStep].required && !canProceed())) ? 'primary' : ''}`}
                >
                  {currentStep === STEPS.length - 1 ? 'Done' : 'Continue →'}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<OTDailyNoteBuilder />, document.getElementById('root'));
  </script>
</body>
</html>
